<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý Đơn hàng</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-item left active-nav" onclick="showTab('tab1', this)">
            <i class="fas fa-file-invoice"></i> THÔNG TIN ĐƠN HÀNG
        </div>
        <div class="nav-logo">
            <img src="logo.png" alt="Logo">
        </div>
        <div class="nav-item right" onclick="showTab('tab2', this)">
            <i class="fas fa-user-check"></i> CHI TIẾT KHÁCH HÀNG
        </div>
    </nav>

    <main class="container">
        <div id="content-tab1" class="tab-content active fade-in">
            <div class="split-layout">
                <div class="form-section border-right">
                    <div class="section-header">
                        <h2>Thông tin đơn hàng</h2>
                    </div>
                    <form id="formSheet1">
                        <div class="input-box">
                            <input type="text" id="h1" required>
                            <label>Họ tên khách hàng</label>
                        </div>
                        <div class="input-box">
                            <input type="text" id="s1" required>
                            <label>Sản phẩm</label>
                        </div>
                        <div class="input-box">
                            <input type="text" id="k1" required>
                            <label>Kích thước</label>
                        </div>
                        <div class="input-box">
                            <input type="text" id="g1" required> 
                            <label>Ghi chú</label>
                        </div>
                        <div class="row">
                            <div class="input-box">
                                <input type="number" id="sl1" required>
                                <label>Số lượng</label>
                            </div>
                            <div class="input-box">
                                <input type="number" id="dg1" required>
                                <label>Đơn giá</label>
                            </div>
                        </div>
                        <div class="input-box total-field">
                            <input type="text" id="tongTienHienThi" readonly>
                            <label class="static">Tổng tiền</label>
                        </div>
                        <button type="submit" class="btn btn-red ripple">Lưu vào hệ thống</button>
                    </form>
                </div>

                <div class="form-section">
                    <div class="section-header">
                        <h2>Trạng thái & Giao hàng</h2>
                    </div>
                    <form id="formSheet2">
                        <div class="input-box">
                            <input type="text" id="h2" required>
                            <label>Họ tên khách hàng</label>
                        </div>
                        <div class="row">
                            <div class="input-box">
                                <input type="text" id="s2" required>
                                <label>Sản phẩm</label>
                            </div>
                            <div class="input-box">
                                <input type="text" id="k2" required>
                                <label>Kích thước</label>
                            </div>
                        </div>
                        <div class="input-box">
                            <input type="text" id="g2" required> 
                            <label>Ghi chú</label>
                        </div>
                        <div class="row">
                            <div class="input-box">
                                <input type="number" id="sl2" required>
                                <label>Số lượng</label>
                            </div>
                            <div class="input-box">
                                <input type="number" id="dg2" required>
                                <label>Đơn giá</label>
                            </div>
                        </div>
                        <div class="row">
                            <div class="input-box">
                                <input type="text" id="nguoi" required>
                                <label>Người thực hiện</label>
                            </div>
                            <div class="input-box">
                                <input type="date" id="ngay" required>
                                <label class="static">Ngày bàn giao</label>
                            </div>
                        </div>
                        <div class="row">
                            <div class="input-box">
                                <select id="tinhTrang">
                                    <option value="Duyệt">Duyệt</option>
                                    <option value="Lên file">Lên file</option>
                                    <option value="Đã in">Đã in</option>
                                    <option value="Hoàn thành">Hoàn thành</option>
                                    <option value="Đã giao">Đã giao</option>
                                </select>
                                <label class="static">Trạng thái đơn hàng</label>
                            </div>
                            <div class="input-box">
                                <select id="thanhToan">
                                    <option value="Chưa thanh toán">Chưa thanh toán</option>
                                    <option value="Đã thanh toán">Đã thanh toán</option>
                                </select>
                                <label class="static">Thanh toán</label>
                            </div>
                        </div>
                        <div class="input-box">
                            <input type="number" id="daTra" value="0" required>
                            <label>Số tiền đã trả (VND)</label>
                        </div>
                        <button type="submit" class="btn btn-gray ripple">Chốt trạng thái</button>
                    </form>
                </div>
            </div>
        </div>

        <div id="content-tab2" class="tab-content fade-in">
            <div class="search-section">
                <div class="search-card">
                    <h2>Truy xuất khách hàng</h2>
                    <div class="search-bar">
                        <input type="text" id="searchName" placeholder="Tên khách hàng...">
                        <button onclick="searchCustomer()"><i class="fas fa-search"></i></button>
                    </div>
                </div>
            </div>
            <div id="invoiceResult" class="invoice-wrapper"></div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
